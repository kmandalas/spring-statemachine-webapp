<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Multi-Step Process</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script>
        // Helper function to initialize date pickers
        function initDatepickers() {
            document.querySelectorAll(".datepicker").forEach(input => {
                flatpickr(input, {
                    dateFormat: "Y-m-d",
                    maxDate: "today"
                });
            });
        }

        // Event listener for when HTMX swaps content
        document.addEventListener('htmx:afterSwap', function(event) {
            initDatepickers();
        });

        document.addEventListener('DOMContentLoaded', function() {
            initDatepickers();
        });
    </script>
</head>
<body class="container mx-auto p-6">
<h2 class="text-center text-2xl font-bold">Multi-Step Process</h2>

<div id="formContainer" class="mt-6"
     th:attr="hx-get=@{/api/process/{id}/form(id=${processId})}"
     hx-trigger="load"
     hx-swap="innerHTML">
    <!-- Dynamic form will be loaded here -->
</div>
</body>
</html>
